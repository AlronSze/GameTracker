<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GameLog">
<title>GameLog</title>
<style>
:root {
  --bg:#0E0F14; --sf:#1A1C26; --sf2:#22253A; --bd:#2A2D42;
  --ac:#7C6FFF; --acg:rgba(124,111,255,.2);
  --bt:#4ECDC4; --btg:rgba(78,205,196,.15);
  --pl:#FFD166; --plg:rgba(255,209,102,.15);
  --tx:#F0F0F5; --sub:#6B7080; --dim:#3A3D54; --dg:#FF6B6B;
  --r:12px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:-apple-system,'PingFang SC',sans-serif;font-size:15px}
#app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;overflow:hidden}

/* HEADER */
.hdr{background:rgba(14,15,20,.97);border-bottom:1px solid var(--bd);
  position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;
  padding:max(env(safe-area-inset-top),44px) 16px 10px}
.hdr-title{font-size:20px;font-weight:800;letter-spacing:-.5px}
.hdr-title span{color:var(--ac)}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--bd);
  background:var(--sf);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;color:var(--sub)}
.tabs{display:flex}
.tab{flex:1;padding:10px 0;font-size:13px;font-weight:600;text-align:center;
  color:var(--sub);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:84px}

/* FAB */
.fab{position:fixed;right:20px;bottom:calc(env(safe-area-inset-bottom,0px) + 24px);
  width:54px;height:54px;border-radius:50%;background:var(--ac);
  box-shadow:0 4px 20px rgba(124,111,255,.45);display:flex;align-items:center;
  justify-content:center;font-size:28px;cursor:pointer;z-index:150;color:#fff;user-select:none}
.fab:active{transform:scale(.93)}

/* SORT BAR */
.sort-bar{display:flex;gap:8px;padding:10px 14px;align-items:center}
.sort-lbl{font-size:12px;color:var(--sub);flex-shrink:0}
.sort-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid var(--bd);color:var(--sub);background:var(--sf);transition:all .15s}
.sort-btn.on{border-color:var(--ac);color:var(--ac);background:var(--acg)}

/* SECTION HEADER */
.sec-hdr{padding:14px 16px 6px;font-size:11px;font-weight:700;color:var(--dim);
  letter-spacing:1px;text-transform:uppercase}

/* LIST */
.list-wrap{padding:0 14px;display:flex;flex-direction:column;gap:8px}
.list-item{display:flex;align-items:center;gap:12px;padding:10px 12px;
  background:var(--sf);border-radius:var(--r);border:1px solid var(--bd);cursor:pointer;transition:all .15s}
.list-item:active{background:var(--sf2)}
.list-item.played-item{border-left:2.5px solid var(--pl)}
.list-cover{width:46px;height:62px;border-radius:6px;object-fit:cover;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.list-cover-ph{width:46px;height:62px;border-radius:6px;background:var(--sf2);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.list-info{flex:1;min-width:0}
.list-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.list-date{font-size:12px;color:var(--sub);margin-bottom:4px}
.list-played-date{font-size:12px;color:var(--pl);font-weight:600;margin-bottom:3px}
.list-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;display:inline-block}
.tag-tbd{background:var(--acg);color:var(--ac);border:1px solid var(--ac)}
.tag-bought{background:var(--btg);color:var(--bt);border:1px solid var(--bt)}
.tag-played{background:var(--plg);color:var(--pl);border:1px solid var(--pl)}
.list-icons{display:flex;flex-direction:column;gap:5px;align-items:center}
.status-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.status-dot.bt{background:var(--btg)}
.status-dot.pl{background:var(--plg)}

/* CALENDAR */
.cal-wrap{padding:0 12px 16px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 4px 10px}
.cal-month{font-size:18px;font-weight:700}
.cal-arrow{width:30px;height:30px;border-radius:50%;border:1px solid var(--bd);
  background:var(--sf);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--sub)}
.cal-arrow:active{background:var(--sf2)}
.cal-wds{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px}
.cal-wd{text-align:center;font-size:10px;font-weight:700;color:var(--dim);padding:3px 0 4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{aspect-ratio:1;border-radius:8px;position:relative;display:flex;
  flex-direction:column;align-items:center;overflow:hidden;background:var(--sf);min-height:42px}
.cal-cell.has-games{background:var(--sf2);cursor:pointer}
.cal-cell.has-games:active{opacity:.8}
.cal-cell.today{box-shadow:0 0 0 1.5px var(--ac)}
.cal-day{font-size:10px;font-weight:700;color:var(--sub);padding:3px 4px 0;align-self:flex-start;z-index:2}
.cal-cell.today .cal-day{color:var(--ac)}
.cal-cover-stack{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1}
.cal-card{position:absolute;width:70%;aspect-ratio:3/4;border-radius:4px;
  object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,.6)}
.cal-card-ph{position:absolute;width:70%;aspect-ratio:3/4;border-radius:4px;
  background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:14px}
.cal-badge{position:absolute;bottom:2px;right:2px;background:var(--ac);color:#fff;
  font-size:9px;font-weight:800;width:14px;height:14px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;z-index:10}
.cal-status{position:absolute;bottom:3px;left:3px;z-index:11;
  width:7px;height:7px;border-radius:50%}

/* OVERLAY / SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.overlay.open{opacity:1;pointer-events:all}
.sheet{width:100%;max-width:480px;background:var(--sf);border-radius:20px 20px 0 0;
  padding-bottom:max(env(safe-area-inset-bottom,0px),16px);
  transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);
  max-height:92vh;display:flex;flex-direction:column}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 10px;flex-shrink:0}
.sheet-title{font-size:18px;font-weight:700}
.sheet-close{width:28px;height:28px;border-radius:50%;background:var(--sf2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--sub)}
.sheet-body{padding:0 20px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.sheet-foot{padding:10px 20px 0;flex-shrink:0;border-top:1px solid var(--bd)}

/* FORM */
.fg{margin-bottom:16px}
.flbl{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.5px;
  text-transform:uppercase;margin-bottom:7px;display:block}
.finput{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);
  color:var(--tx);font-size:15px;padding:11px 13px;outline:none;
  font-family:inherit;-webkit-appearance:none;appearance:none}
.finput:focus{border-color:var(--ac)}
.finput::placeholder{color:var(--dim)}
select.finput{cursor:pointer}

/* DATE PRECISION PICKER */
.date-prec{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.date-prec-row2{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.dopt{padding:8px 4px;border-radius:var(--rs);border:1px solid var(--bd);
  background:var(--sf2);text-align:center;font-size:12px;font-weight:600;
  color:var(--sub);cursor:pointer;transition:all .15s}
.dopt.on{border-color:var(--ac);color:var(--ac);background:var(--acg)}
.date-fields{display:flex;flex-direction:column;gap:8px}
.date-row{display:flex;gap:8px}
.date-row .finput{flex:1}

/* COVER PICKER */
.cover-pick{display:flex;align-items:center;gap:12px}
.cover-prev{width:62px;height:82px;border-radius:8px;background:var(--sf2);
  border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;
  font-size:26px;cursor:pointer;flex-shrink:0;overflow:hidden}
.cover-prev img{width:100%;height:100%;object-fit:cover}
.cover-acts{display:flex;flex-direction:column;gap:7px;flex:1}
.cover-btn{padding:9px 12px;border-radius:var(--rs);font-size:12px;font-weight:600;
  text-align:center;cursor:pointer;border:1px solid var(--bd);color:var(--tx);background:var(--sf2)}
.cover-btn:active{background:var(--bd)}
.cover-btn.danger{color:var(--dg)}

/* BUTTONS */
.btn{width:100%;padding:13px;border-radius:var(--r);font-size:15px;font-weight:700;
  text-align:center;cursor:pointer;border:none;transition:all .15s;margin-top:4px}
.btn-primary{background:var(--ac);color:#fff}
.btn-primary:active{background:#6a5fee}
.btn-danger{background:rgba(255,107,107,.12);color:var(--dg);
  border:1px solid rgba(255,107,107,.25)!important;margin-top:8px}

/* DETAIL */
.detail-cover-ph{width:100%;aspect-ratio:16/9;background:var(--sf2);border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;font-size:52px;margin-bottom:14px}
.detail-cover-img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:var(--r);margin-bottom:14px}
.detail-title{font-size:22px;font-weight:800;margin-bottom:5px;letter-spacing:-.3px}
.detail-date{font-size:13px;color:var(--sub);margin-bottom:14px}
.detail-acts{display:flex;gap:8px;margin-bottom:16px}
.detail-act{flex:1;padding:10px 6px;border-radius:10px;font-size:12px;font-weight:700;
  text-align:center;cursor:pointer;border:1px solid var(--bd);background:var(--sf2);
  color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s}
.detail-act:active{opacity:.8}
.detail-act.bt-on{background:var(--btg);border-color:var(--bt);color:var(--bt)}
.detail-act.pl-on{background:var(--plg);border-color:var(--pl);color:var(--pl)}
.detail-act-icon{font-size:22px}
.detail-edit-row{display:flex;gap:8px;margin-top:4px}
.detail-edit-btn{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;
  text-align:center;cursor:pointer;border:1px solid var(--bd);background:var(--sf2);color:var(--tx)}
.detail-edit-btn:active{background:var(--bd)}
.played-date-box{background:var(--sf2);border-radius:10px;padding:12px 14px;margin-bottom:14px}
.played-date-lbl{font-size:11px;font-weight:700;color:var(--pl);letter-spacing:.5px;
  text-transform:uppercase;margin-bottom:8px}

/* IO */
.io-btn{display:flex;align-items:center;gap:12px;padding:13px 14px;
  background:var(--sf2);border-radius:10px;cursor:pointer;border:1px solid var(--bd);margin-bottom:10px}
.io-btn:active{background:var(--bd)}
.io-icon{font-size:22px}
.io-title{font-size:14px;font-weight:600;margin-bottom:2px}
.io-desc{font-size:11px;color:var(--sub)}
.io-tip{margin-top:14px;padding:12px 14px;background:var(--sf2);border-radius:10px;
  font-size:12px;color:var(--sub);line-height:1.7}

/* EMPTY */
.empty{padding:60px 20px;text-align:center}
.empty-icon{font-size:50px;margin-bottom:14px}
.empty-title{font-size:17px;font-weight:700;margin-bottom:8px}
.empty-desc{font-size:13px;color:var(--sub);line-height:1.6}

/* TOAST */
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 90px);
  left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--sf2);border:1px solid var(--bd);border-radius:24px;
  padding:9px 20px;font-size:13px;font-weight:600;color:var(--tx);
  z-index:500;opacity:0;transition:all .22s;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.4);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

input[type="file"]{display:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-title">GAME<span>LOG</span></div>
      <div class="icon-btn" onclick="openIO()">⇅</div>
    </div>
    <div class="tabs">
      <div class="tab on" id="tab-calendar" onclick="switchTab('calendar')">📅 日历</div>
      <div class="tab" id="tab-list" onclick="switchTab('list')">☰ 列表</div>
      <div class="tab" id="tab-played" onclick="switchTab('played')">⭐ 游玩</div>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="fab" onclick="openAdd()">＋</div>
<div class="toast" id="toast"></div>

<!-- ADD/EDIT SHEET -->
<div class="overlay" id="ov-add" onclick="bgClose(event,'ov-add')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <div class="sheet-title" id="add-title">添加游戏</div>
      <div class="sheet-close" onclick="close('ov-add')">✕</div>
    </div>
    <div class="sheet-body">
      <div class="fg">
        <label class="flbl">游戏名称</label>
        <input class="finput" id="f-name" type="text" placeholder="例：最终幻想 XVII">
      </div>
      <div class="fg">
        <label class="flbl">封面图片</label>
        <div class="cover-pick">
          <div class="cover-prev" id="cover-prev" onclick="document.getElementById('f-file').click()">🎮</div>
          <div class="cover-acts">
            <div class="cover-btn" onclick="document.getElementById('f-file').click()">📁 从相册选取</div>
            <div class="cover-btn" onclick="pickUrl()">🔗 粘贴图片链接</div>
            <div class="cover-btn danger" id="cover-rm" style="display:none" onclick="rmCover()">🗑 移除封面</div>
          </div>
        </div>
        <input type="file" id="f-file" accept="image/*" onchange="handleFile(event)">
      </div>
      <div class="fg">
        <label class="flbl">发售时间</label>
        <!-- 6 precision options in 2 rows of 3 -->
        <div class="date-prec">
          <div class="dopt on" id="dp-exact"  onclick="setPrec('exact')">具体日期</div>
          <div class="dopt"    id="dp-month"  onclick="setPrec('month')">年 · 月</div>
          <div class="dopt"    id="dp-quarter"onclick="setPrec('quarter')">年 · 季度</div>
        </div>
        <div class="date-prec-row2">
          <div class="dopt"    id="dp-year"   onclick="setPrec('year')">仅年份</div>
          <div class="dopt"    id="dp-tbd"    onclick="setPrec('tbd')">待定 TBD</div>
          <div class="dopt"    id="dp-unknown"onclick="setPrec('unknown')">未知</div>
        </div>
        <!-- dynamic fields -->
        <div id="date-fields"></div>
      </div>
    </div>
    <div class="sheet-foot">
      <button class="btn btn-primary" id="save-btn" onclick="saveGame()">保存游戏</button>
      <button class="btn btn-danger" id="del-btn" style="display:none" onclick="deleteGame()">删除此游戏</button>
    </div>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="overlay" id="ov-detail" onclick="bgClose(event,'ov-detail')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <div class="sheet-title">游戏详情</div>
      <div class="sheet-close" onclick="close('ov-detail')">✕</div>
    </div>
    <div class="sheet-body" id="detail-body"></div>
    <div class="sheet-foot">
      <div class="detail-edit-row">
        <div class="detail-edit-btn" onclick="editFromDetail()">✏️ 编辑</div>
        <div class="detail-edit-btn" onclick="close('ov-detail')">关闭</div>
      </div>
    </div>
  </div>
</div>

<!-- DAY SHEET -->
<div class="overlay" id="ov-day" onclick="bgClose(event,'ov-day')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <div class="sheet-title" id="day-title">当日发售</div>
      <div class="sheet-close" onclick="close('ov-day')">✕</div>
    </div>
    <div class="sheet-body" id="day-body"></div>
  </div>
</div>

<!-- IO SHEET -->
<div class="overlay" id="ov-io" onclick="bgClose(event,'ov-io')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <div class="sheet-title">数据管理</div>
      <div class="sheet-close" onclick="close('ov-io')">✕</div>
    </div>
    <div class="sheet-body">
      <div style="padding:6px 0 12px">
        <div class="io-btn" onclick="exportData()">
          <div class="io-icon">📤</div>
          <div><div class="io-title">导出数据</div><div class="io-desc">保存为 JSON 文件，用于备份或迁移</div></div>
        </div>
        <div class="io-btn" onclick="document.getElementById('f-import').click()">
          <div class="io-icon">📥</div>
          <div><div class="io-title">导入数据</div><div class="io-desc">从 JSON 文件恢复，将合并现有数据</div></div>
        </div>
        <div class="io-btn" style="border-color:rgba(255,107,107,.3)" onclick="clearAll()">
          <div class="io-icon">🗑️</div>
          <div><div class="io-title" style="color:var(--dg)">清空所有数据</div><div class="io-desc">操作前请先导出备份</div></div>
        </div>
        <input type="file" id="f-import" accept=".json" onchange="importData(event)">
        <div class="io-tip">
          💡 <strong style="color:var(--tx)">保存到桌面：</strong>
          在 Safari 中打开此文件 → 点击底部分享按钮 → 添加到主屏幕，即可像 App 一样使用。
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
const SK = 'gamelog_v3';
let games = [];
let tab = 'calendar';
let calY = new Date().getFullYear();
let calM = new Date().getMonth();
let sort = 'date';
let editId = null;
let detailId = null;
let prec = 'exact';   // exact | month | quarter | year | tbd | unknown
let coverData = null;

function save() { try { localStorage.setItem(SK, JSON.stringify(games)); } catch(e){} }
function load() { try { const d = localStorage.getItem(SK); if(d) games = JSON.parse(d); } catch(e){ games=[]; } }

// ─────────────────────────────────────────
// DATE HELPERS
// ─────────────────────────────────────────
// A game stores: { releaseDate, releasePrecision }
// releaseDate: '2025-03-15' | '2025-03' | '2025-Q2' | '2025' | 'tbd' | 'unknown'
// releasePrecision: 'exact'|'month'|'quarter'|'year'|'tbd'|'unknown'

function fmtRelease(g) {
  const p = g.releasePrecision || 'exact';
  const d = g.releaseDate || '';
  if (p === 'tbd' || d === 'tbd') return '待定 TBD';
  if (p === 'unknown' || d === 'unknown') return '发售日期未知';
  if (p === 'year') return d + ' 年';
  if (p === 'quarter') {
    const [y, q] = d.split('-');
    return `${y} 年 ${q}`;
  }
  if (p === 'month') {
    const [y, m] = d.split('-');
    return `${y} 年 ${parseInt(m)} 月`;
  }
  // exact
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return `${dt.getFullYear()} 年 ${dt.getMonth()+1} 月 ${dt.getDate()} 日`;
}

function releaseYear(g) {
  const d = g.releaseDate || '';
  if (!d || d === 'tbd' || d === 'unknown') return null;
  return parseInt(d.split('-')[0]);
}

function releaseExactDate(g) {
  // returns 'YYYY-MM-DD' only if precision is exact
  if ((g.releasePrecision || 'exact') === 'exact' && g.releaseDate && g.releaseDate.length === 10) return g.releaseDate;
  return null;
}

function sortKey(g) {
  const p = g.releasePrecision || 'exact';
  if (p === 'tbd') return '9998';
  if (p === 'unknown') return '9999';
  if (p === 'exact') return g.releaseDate || '9997';
  if (p === 'month') return g.releaseDate + '-15';
  if (p === 'quarter') {
    const [y, q] = g.releaseDate.split('-');
    const m = {'Q1':'02','Q2':'05','Q3':'08','Q4':'11'}[q] || '06';
    return `${y}-${m}-15`;
  }
  if (p === 'year') return g.releaseDate + '-07-01';
  return '9999';
}

function today() { return new Date().toISOString().slice(0,10); }
function fmtExact(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  return `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日`;
}
function fmtYM(s) { const [y,m]=s.split('-'); return `${y} 年 ${parseInt(m)} 月`; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
load();
render();

// ─────────────────────────────────────────
// TABS
// ─────────────────────────────────────────
function switchTab(t) {
  tab = t;
  ['calendar','list','played'].forEach(k => {
    document.getElementById('tab-'+k).classList.toggle('on', k===t);
  });
  render();
}

// ─────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────
function render() {
  const el = document.getElementById('content');
  if (tab==='calendar') el.innerHTML = renderCalendar();
  else if (tab==='list') el.innerHTML = renderList();
  else el.innerHTML = renderPlayed();
}

// ─────────────────────────────────────────
// CALENDAR
// ─────────────────────────────────────────
function renderCalendar() {
  const todayStr = today();
  const firstDay = new Date(calY, calM, 1).getDay();
  const days = new Date(calY, calM+1, 0).getDate();
  const months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

  // group by exact date
  const byDate = {};
  games.forEach(g => {
    const d = releaseExactDate(g);
    if (d) { if (!byDate[d]) byDate[d]=[]; byDate[d].push(g); }
  });

  // "vague" games (year/quarter/month) that match current calendar month
  const vagueThisMonth = games.filter(g => {
    const p = g.releasePrecision || 'exact';
    if (p === 'tbd' || p === 'unknown' || p === 'exact') return false;
    const ry = releaseYear(g);
    if (ry !== calY) return false;
    if (p === 'year') return true;
    if (p === 'quarter') {
      const q = parseInt((g.releaseDate||'').split('-Q')[1]);
      const mq = Math.floor(calM/3)+1;
      return q === mq;
    }
    if (p === 'month') {
      const rm = parseInt((g.releaseDate||'').split('-')[1]);
      return rm === calM+1;
    }
    return false;
  });

  const tbd = games.filter(g => g.releasePrecision==='tbd' || g.releasePrecision==='unknown');

  const offset = firstDay===0 ? 6 : firstDay-1;
  let cells = '';
  for (let i=0;i<offset;i++) cells += '<div></div>';

  for (let d=1; d<=days; d++) {
    const ds = `${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds===todayStr;
    const dg = byDate[ds]||[];
    const has = dg.length>0;
    let dotHtml = '';
    if (has) {
      const allPlayed = dg.every(g=>g.played);
      const anyBought = dg.some(g=>g.bought||g.played);
      const dotColor = allPlayed ? 'var(--pl)' : anyBought ? 'var(--bt)' : '';
      if (dotColor) dotHtml = `<div class="cal-status" style="background:${dotColor};box-shadow:0 0 4px ${dotColor}"></div>`;
    }
    let coverHtml = '';
    if (has) {
      coverHtml = '<div class="cal-cover-stack">';
      dg.slice(0,2).forEach((g,i) => {
        const rot = i===0 ? 'rotate(-4deg) translateX(-3px)' : 'rotate(3deg) translateX(3px)';
        const zi = 2-i;
        if (g.cover) {
          coverHtml += `<img class="cal-card" src="${esc(g.cover)}" style="z-index:${zi};transform:${rot}">`;
        } else {
          coverHtml += `<div class="cal-card-ph" style="z-index:${zi};transform:${rot}">🎮</div>`;
        }
      });
      coverHtml += '</div>';
    }
    const badge = dg.length>2 ? `<div class="cal-badge">${dg.length}</div>` : '';
    cells += `<div class="cal-cell${has?' has-games':''}${isToday?' today':''}" ${has?`onclick="openDay('${ds}')"`:''}>
      <span class="cal-day">${d}</span>
      ${coverHtml}${badge}${dotHtml}
    </div>`;
  }

  let vagueHtml = '';
  if (vagueThisMonth.length > 0) {
    vagueHtml = `<div class="sec-hdr">🗓 本月范围内发售 (${vagueThisMonth.length})</div>
    <div class="list-wrap">${vagueThisMonth.map(g=>listItemHtml(g,false,false)).join('')}</div>`;
  }

  let tbdHtml = '';
  if (tbd.length > 0) {
    tbdHtml = `<div class="sec-hdr">📌 待定 / 未知 (${tbd.length})</div>
    <div class="list-wrap">${tbd.map(g=>listItemHtml(g,false,false)).join('')}</div>`;
  }

  const empty = games.length===0 ? emptyHtml('📅','还没有游戏发售记录','点击右下角 ＋ 添加你期待的游戏') : '';

  return `<div class="cal-wrap">
    <div class="cal-nav">
      <div class="cal-arrow" onclick="chMonth(-1)">‹</div>
      <div class="cal-month">${calY} 年 ${months[calM]}</div>
      <div class="cal-arrow" onclick="chMonth(1)">›</div>
    </div>
    <div class="cal-wds">${['一','二','三','四','五','六','日'].map(w=>`<div class="cal-wd">${w}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
  </div>
  ${vagueHtml}${tbdHtml}${empty}`;
}

function chMonth(d) {
  calM += d;
  if (calM>11){calM=0;calY++;} if(calM<0){calM=11;calY--;}
  render();
}

function openDay(ds) {
  const dg = games.filter(g => releaseExactDate(g)===ds);
  const dt = new Date(ds+'T00:00:00');
  document.getElementById('day-title').textContent = `${dt.getFullYear()} 年 ${dt.getMonth()+1} 月 ${dt.getDate()} 日`;
  document.getElementById('day-body').innerHTML = `<div class="list-wrap" style="padding:4px 0 8px">${dg.map(g=>listItemHtml(g,false,false)).join('')}</div>`;
  open('ov-day');
}

// ─────────────────────────────────────────
// LIST
// ─────────────────────────────────────────
function renderList() {
  if (!games.length) return emptyHtml('🎮','游戏列表是空的','添加你的第一款游戏吧');
  const sorted = [...games].sort((a,b) => {
    if (sort==='name') return a.name.localeCompare(b.name,'zh');
    return sortKey(a).localeCompare(sortKey(b));
  });
  return `<div class="sort-bar">
    <span class="sort-lbl">排序：</span>
    <div class="sort-btn${sort==='date'?' on':''}" onclick="setSort('date')">📅 发售日</div>
    <div class="sort-btn${sort==='name'?' on':''}" onclick="setSort('name')">🔤 名称</div>
  </div>
  <div class="list-wrap">${sorted.map(g=>listItemHtml(g,false,false)).join('')}</div>`;
}

function setSort(s) { sort=s; render(); }

// ─────────────────────────────────────────
// PLAYED
// ─────────────────────────────────────────
function renderPlayed() {
  const pg = games.filter(g=>g.played).sort((a,b)=>((b.playedDate||'9999')).localeCompare(a.playedDate||'9999'));
  if (!pg.length) return emptyHtml('⭐','还没有游玩记录','将游戏标记为已游玩后，会在这里显示');
  const groups = {};
  pg.forEach(g => { const k=g.playedDate?g.playedDate.slice(0,7):'unknown'; if(!groups[k])groups[k]=[]; groups[k].push(g); });
  let html = '<div style="padding-bottom:8px">';
  Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([k,gs]) => {
    html += `<div class="sec-hdr">${k==='unknown'?'日期未知':fmtYM(k)}</div>
    <div class="list-wrap">${gs.map(g=>listItemHtml(g,true,true)).join('')}</div>`;
  });
  html += '</div>';
  return html;
}

// ─────────────────────────────────────────
// LIST ITEM HTML
// ─────────────────────────────────────────
function listItemHtml(g, isPlayedRow, inPlayedTab) {
  const cover = g.cover
    ? `<img class="list-cover" src="${esc(g.cover)}" onerror="this.style.display='none'">`
    : `<div class="list-cover-ph">🎮</div>`;

  const dateHtml = (isPlayedRow && g.playedDate)
    ? `<div class="list-played-date">🎮 ${fmtExact(g.playedDate)}</div>`
    : `<div class="list-date">${fmtRelease(g)}</div>`;

  const p = g.releasePrecision || 'exact';
  const tags = [
    (p==='tbd'||p==='unknown') ? `<span class="tag tag-tbd">${p==='tbd'?'TBD':'未知'}</span>` : '',
    (!inPlayedTab && g.bought) ? `<span class="tag tag-bought">💳 已购买</span>` : '',
    (!inPlayedTab && g.played) ? `<span class="tag tag-played">⭐ 已游玩</span>` : '',
  ].filter(Boolean).join('');

  const icons = [
    (!inPlayedTab && g.bought) ? `<div class="status-dot bt">💳</div>` : '',
    (!inPlayedTab && g.played) ? `<div class="status-dot pl">⭐</div>` : '',
  ].filter(Boolean).join('');

  return `<div class="list-item${isPlayedRow?' played-item':''}" onclick="openDetail('${g.id}')">
    ${cover}
    <div class="list-info">
      <div class="list-name">${esc(g.name)}</div>
      ${dateHtml}
      ${tags?`<div class="list-tags">${tags}</div>`:''}
    </div>
    <div class="list-icons">${icons}</div>
  </div>`;
}

// ─────────────────────────────────────────
// DETAIL
// ─────────────────────────────────────────
function openDetail(id) {
  detailId = id;
  renderDetail();
  open('ov-detail');
}

function renderDetail() {
  const g = games.find(x=>x.id===detailId);
  if (!g) return;
  const coverHtml = g.cover
    ? `<img class="detail-cover-img" src="${esc(g.cover)}">`
    : `<div class="detail-cover-ph">🎮</div>`;
  const playedBox = g.played ? `<div class="played-date-box">
    <div class="played-date-lbl">⭐ 游玩日期</div>
    <input class="finput" type="date" value="${g.playedDate||today()}" onchange="setPlayedDate(this.value)">
  </div>` : '';
  document.getElementById('detail-body').innerHTML = `
    ${coverHtml}
    <div class="detail-title">${esc(g.name)}</div>
    <div class="detail-date">🗓 ${fmtRelease(g)}</div>
    <div class="detail-acts">
      <div class="detail-act${g.bought?' bt-on':''}" onclick="toggleStatus('bought')">
        <div class="detail-act-icon">💳</div>
        <div>${g.bought?'已购买':'标记购买'}</div>
      </div>
      <div class="detail-act${g.played?' pl-on':''}" onclick="toggleStatus('played')">
        <div class="detail-act-icon">⭐</div>
        <div>${g.played?'已游玩':'标记游玩'}</div>
      </div>
    </div>
    ${playedBox}`;
}

function toggleStatus(field) {
  const idx = games.findIndex(g=>g.id===detailId);
  if (idx<0) return;
  games[idx][field] = !games[idx][field];
  if (field==='played' && games[idx].played && !games[idx].playedDate) games[idx].playedDate = today();
  if (field==='played' && !games[idx].played) games[idx].playedDate = null;
  save(); render(); renderDetail();
  showToast(games[idx][field] ? '已标记 ✓' : '已取消');
}

function setPlayedDate(val) {
  const idx = games.findIndex(g=>g.id===detailId);
  if (idx>=0) { games[idx].playedDate=val; save(); render(); }
}

function editFromDetail() {
  close('ov-detail');
  setTimeout(() => openEdit(detailId), 180);
}

// ─────────────────────────────────────────
// ADD / EDIT FORM
// ─────────────────────────────────────────
function openAdd() {
  editId = null;
  coverData = null;
  document.getElementById('add-title').textContent = '添加游戏';
  document.getElementById('save-btn').textContent = '保存游戏';
  document.getElementById('f-name').value = '';
  document.getElementById('del-btn').style.display = 'none';
  setCoverPreview(null);
  setPrec('exact');
  open('ov-add');
}

function openEdit(id) {
  const g = games.find(x=>x.id===id);
  if (!g) return;
  editId = id;
  coverData = g.cover || null;
  document.getElementById('add-title').textContent = '编辑游戏';
  document.getElementById('save-btn').textContent = '保存更改';
  document.getElementById('f-name').value = g.name;
  document.getElementById('del-btn').style.display = 'block';
  setCoverPreview(g.cover);
  setPrec(g.releasePrecision||'exact');
  setTimeout(() => fillDateFields(g), 10);
  open('ov-add');
}

function fillDateFields(g) {
  const p = g.releasePrecision || 'exact';
  const d = g.releaseDate || '';
  if (p==='exact') { const el=document.getElementById('f-exact'); if(el) el.value=d; }
  else if (p==='month') {
    const [y,m]=d.split('-');
    const ey=document.getElementById('f-my'); const em=document.getElementById('f-mm');
    if(ey) ey.value=y; if(em) em.value=m;
  }
  else if (p==='quarter') {
    const [y,q]=d.split('-');
    const ey=document.getElementById('f-qy'); const eq=document.getElementById('f-qq');
    if(ey) ey.value=y; if(eq) eq.value=q;
  }
  else if (p==='year') { const el=document.getElementById('f-year'); if(el) el.value=d; }
}

// DATE PRECISION
function setPrec(p) {
  prec = p;
  ['exact','month','quarter','year','tbd','unknown'].forEach(k => {
    document.getElementById('dp-'+k).classList.toggle('on', k===p);
  });
  const container = document.getElementById('date-fields');
  const thisYear = new Date().getFullYear();
  const yearOpts = Array.from({length:12},(_,i)=>thisYear-1+i).map(y=>`<option value="${y}">${y}</option>`).join('');
  const monthOpts = Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${String(m).padStart(2,'0')}">${m} 月</option>`).join('');
  const quarterOpts = ['Q1 (1–3月)','Q2 (4–6月)','Q3 (7–9月)','Q4 (10–12月)'].map((l,i)=>`<option value="Q${i+1}">${l}</option>`).join('');
  if (p==='exact') {
    container.innerHTML = `<input class="finput" id="f-exact" type="date">`;
  } else if (p==='month') {
    container.innerHTML = `<div class="date-row">
      <select class="finput" id="f-my">${yearOpts}</select>
      <select class="finput" id="f-mm">${monthOpts}</select>
    </div>`;
  } else if (p==='quarter') {
    container.innerHTML = `<div class="date-row">
      <select class="finput" id="f-qy">${yearOpts}</select>
      <select class="finput" id="f-qq">${quarterOpts}</select>
    </div>`;
  } else if (p==='year') {
    container.innerHTML = `<select class="finput" id="f-year">${yearOpts}</select>`;
  } else {
    container.innerHTML = '';
  }
}

function getDateValue() {
  if (prec==='exact') return document.getElementById('f-exact')?.value || null;
  if (prec==='month') {
    const y=document.getElementById('f-my')?.value;
    const m=document.getElementById('f-mm')?.value;
    return (y&&m) ? `${y}-${m}` : null;
  }
  if (prec==='quarter') {
    const y=document.getElementById('f-qy')?.value;
    const q=document.getElementById('f-qq')?.value;
    return (y&&q) ? `${y}-${q}` : null;
  }
  if (prec==='year') return document.getElementById('f-year')?.value || null;
  if (prec==='tbd') return 'tbd';
  if (prec==='unknown') return 'unknown';
  return null;
}

function saveGame() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('请输入游戏名称'); return; }
  const releaseDate = getDateValue();
  const releasePrecision = prec;
  if (editId) {
    const idx = games.findIndex(g=>g.id===editId);
    if (idx>=0) games[idx] = {...games[idx], name, releaseDate, releasePrecision, cover: coverData};
    showToast('已更新 ✓');
  } else {
    games.push({id:uid(), name, releaseDate, releasePrecision, cover:coverData, bought:false, played:false, playedDate:null});
    showToast('已添加 ✓');
  }
  save(); render(); close('ov-add');
}

function deleteGame() {
  if (!editId) return;
  if (!confirm('确认删除此游戏？')) return;
  games = games.filter(g=>g.id!==editId);
  save(); render(); close('ov-add'); close('ov-detail');
  showToast('已删除');
}

// ─────────────────────────────────────────
// COVER
// ─────────────────────────────────────────
function handleFile(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => { coverData=ev.target.result; setCoverPreview(coverData); };
  reader.readAsDataURL(file);
  e.target.value='';
}
function pickUrl() {
  const url = prompt('粘贴图片 URL：');
  if (url && url.startsWith('http')) { coverData=url; setCoverPreview(url); }
}
function rmCover() { coverData=null; setCoverPreview(null); }
function setCoverPreview(src) {
  const el = document.getElementById('cover-prev');
  const rm = document.getElementById('cover-rm');
  el.innerHTML = src ? `<img src="${esc(src)}">` : '🎮';
  rm.style.display = src ? 'block' : 'none';
}

// ─────────────────────────────────────────
// IO
// ─────────────────────────────────────────
function openIO() { open('ov-io'); }
function exportData() {
  const blob = new Blob([JSON.stringify({version:2,games},null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`gamelog_${today()}.json`; a.click();
  URL.revokeObjectURL(url); showToast('已导出 ✓');
}
function importData(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try {
      const data=JSON.parse(ev.target.result);
      const imported=data.games||data;
      if(!Array.isArray(imported)) throw new Error();
      const ids=new Set(games.map(g=>g.id));
      let added=0;
      imported.forEach(g=>{ if(!ids.has(g.id)){games.push(g);added++;} });
      save(); render(); close('ov-io'); showToast(`已导入 ${added} 条 ✓`);
    } catch(err){ showToast('导入失败，格式错误'); }
  };
  reader.readAsText(file); e.target.value='';
}
function clearAll() {
  if (!confirm('确认清空所有数据？不可恢复！')) return;
  games=[]; save(); render(); close('ov-io'); showToast('已清空');
}

// ─────────────────────────────────────────
// OVERLAY
// ─────────────────────────────────────────
function open(id) { document.getElementById(id).classList.add('open'); }
function close(id) { document.getElementById(id).classList.remove('open'); }
function bgClose(e,id) { if(e.target===document.getElementById(id)) close(id); }

// ─────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ─────────────────────────────────────────
// EMPTY STATE
// ─────────────────────────────────────────
function emptyHtml(icon,title,desc) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-desc">${desc}</div></div>`;
}
</script>
